name: safe_her_travel
description: A mobile safety application for women in Tamil Nadu.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  geolocator: ^13.0.1
  http: ^1.2.1
  provider: ^6.1.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  url_launcher: ^6.3.0
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2
  intl: ^0.19.0
  image_picker: ^1.1.2
  record: ^5.1.0
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  flutter_markdown: ^0.7.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/safety_shield.png
    - assets/images/community.png
    - assets/images/map_art.png
    - assets/images/safeher_logo.jpg
