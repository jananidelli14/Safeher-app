<body>

<script>
// ─── Gemini direct call (bypasses CORS since browser fetch allows it) ─────────
window.callGeminiAI = async function(userMessage, lat, lng) {
  const GEMINI_KEY = 'AIzaSyAh6cjiCAmQg_AdY8bmSC1ZtW-3Oo8XyVY';
  const now = new Date();
  const timeStr = now.toLocaleTimeString('en-IN', {hour: '2-digit', minute: '2-digit'});
  const locCtx = (lat && lng)
    ? `User is currently at coordinates ${lat.toFixed(4)}, ${lng.toFixed(4)} in Tamil Nadu, India.`
    : 'User is in Tamil Nadu, India.';

  const systemPrompt = `You are SafeHer AI, a real-time women's safety assistant for Tamil Nadu, India.
${locCtx}
Current time: ${timeStr}.
You help women with: nearby police stations, hospitals, safe travel routes, night travel safety, emergency contacts, scam awareness, safe neighborhoods in Tamil Nadu.
Always be concise, practical, and empathetic. Include relevant emergency numbers when helpful: Police 100, Emergency 112, Women Helpline 1091, Ambulance 108.
Respond in the same language the user writes in — Tamil or English.`;

  try {
    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: systemPrompt + '\n\nUser: ' + userMessage }] }],
          generationConfig: { maxOutputTokens: 600, temperature: 0.7 }
        })
      }
    );
    if (!response.ok) {
      const err = await response.text();
      console.error('Gemini error:', err);
      return null;
    }
    const data = await response.json();
    return data?.candidates?.[0]?.content?.parts?.[0]?.text || null;
  } catch(e) {
    console.error('Gemini fetch failed:', e);
    return null;
  }
};

// ─── High-accuracy GPS (forces browser to use real GPS, not IP) ───────────────
window.getAccurateLocation = function(callback) {
  if (!navigator.geolocation) { callback(null, 'Geolocation not supported'); return; }
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      callback({ lat: pos.coords.latitude, lng: pos.coords.longitude, accuracy: pos.coords.accuracy }, null);
    },
    function(err) { callback(null, err.message); },
    { enableHighAccuracy: true, timeout: 20000, maximumAge: 0 }  // maximumAge:0 = NEVER use cached
  );
};
</script>

<script src="flutter_bootstrap.js" async></script>
